<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zetto - Dashboard</title>
    <style>
        /* Global Resets */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f7f9;
        }

        /* Main Wrapper */
        .dashboard-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }

        /* Top Navigation Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            height: 70px;
            background-color: white;
            border-bottom: 1px solid #e1e4e8;
            flex-shrink: 0;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-box {
            background-color: skyblue;
            color: white;
            font-weight: bold;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 1.2rem;
        }

        .brand-name {
            font-size: 1.2rem;
            font-weight: 700;
            color: #333;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 35px;
            height: 35px;
            background-color: #ddd;
            border-radius: 50%;
        }

        /* Main Content Area */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 40px;
            overflow-y: auto;
        }

        .content-container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            margin: 0;
            font-size: 2rem;
            color: #222;
        }

        .add-btn {
            background-color: skyblue;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover {
            background-color: #7dc8e8;
        }

        /* Center Empty State */
        .empty-state {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .icon-circle {
            width: 100px;
            height: 100px;
            background-color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .icon-circle span {
            font-size: 3rem;
            color: skyblue;
            line-height: 1;
        }

        .empty-state h2 {
            margin: 0 0 10px 0;
            color: #333;
        }

        .empty-state p {
            color: #777;
            margin-bottom: 25px;
        }

        /* Bottom Tab Navigation */
        .bottom-nav {
            background-color: white;
            border-top: 1px solid #e1e4e8;
            height: 80px;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
        }

        .nav-links {
            display: flex;
            gap: 80px;
        }

        .nav-link {
            text-decoration: none;
            color: #888;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            padding: 10px 0;
            border-bottom: 3px solid transparent;
            cursor: pointer;
        }

        .nav-link.active {
            color: skyblue;
            border-bottom-color: skyblue;
        }

        .nav-icon {
            font-size: 1.3rem;
        }
    </style>
</head>
<body>

    <div class="dashboard-wrapper">
        <!-- Top Navigation -->
        <header class="top-bar">
            <div class="brand">
                <div class="logo-box">Z</div>
                <span class="brand-name">Zetto</span>
            </div>
            <div class="user-info">
                <span>John Doe</span>
                <div class="avatar"></div>
            </div>
        </header>

        <!-- Main Body -->
        <main class="main-content">
            <div class="content-container">
                <header class="page-header">
                    <h1>My Trips <span style="font-size: 0.8rem; color: #aaa; vertical-align: middle;">▼</span></h1>
                    <button class="add-btn">+ New Trip</button>
                </header>

                <div class="empty-state">
                    <div>
                        <div class="icon-circle">
                            <span>+</span>
                        </div>
                        <h2>No trips yet</h2>
                        <p>Create your first group trip to get started!</p>
                        <button class="add-btn" style="padding: 15px 40px;">Get Started</button>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer Navigation -->
        <nav class="bottom-nav">
            <div class="nav-links">
                <div class="nav-link active">
                    <span class="nav-icon">✈</span> My Trips
                </div>
                <div class="nav-link">
                    <span class="nav-icon">📅</span> Calendar
                </div>
                <div class="nav-link">
                    <span class="nav-icon">👤</span> My Profile
                </div>
            </div>
        </nav>
    </div>

</body>
</html>
