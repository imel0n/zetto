<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zetto Login</title>
    <style>
        /* Base styles to mimic the Vue environment */
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5; /* Light background to make the white card pop */
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh; /* Centers the card vertically on the screen */
            width: 100%;
        }

        .login-card {
            background-color: white;
            padding: 2.5rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            margin-bottom: 2rem;
            font-weight: 600;
            margin-top: 0;
        }

        .input-field {
            text-align: left;
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #666;
            font-size: 0.9rem;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid lightgrey;
            border-radius: 6px;
            font-size: 1rem;
            box-sizing: border-box; /* Fixes the alignment/centering issue */
        }

        input:focus {
            outline: none;
            border: 1px solid skyblue;
        }

        .login-button {
            width: 100%;
            padding: 12px;
            background-color: skyblue;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 1rem;
            box-sizing: border-box; /* Fixes the alignment/centering issue */
        }

        .login-button:hover {
            background-color: rgb(125, 192, 219);
        }

        .footer-text {
            margin-top: 1.5rem;
            font-size: 0.85rem;
            color: #333;
        }

        .footer-text span {
            color: skyblue;
            font-weight: 600;
        }

        .footer-text span:hover {
            cursor: pointer;
            color: rgb(125, 192, 219);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-card">
            <h1>Login</h1>
            
            <div class="input-field">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter your username" />
            </div>

            <div class="input-field">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" />
            </div>

            <button class="login-button">Log In</button>
            
            <p class="footer-text">Don't have an account? <span>Sign up</span></p>
        </div>
    </div>

</body>
</html>
